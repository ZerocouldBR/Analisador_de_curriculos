global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'analisador-curriculos'

scrape_configs:
  # FastAPI Application Metrics
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'

  # Celery Worker Metrics (via Flower)
  - job_name: 'celery'
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'celery'

  # Redis Metrics (requires redis_exporter container - uncomment when added)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'

  # PostgreSQL Metrics (requires postgres_exporter container - uncomment when added)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         service: 'postgres'

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
