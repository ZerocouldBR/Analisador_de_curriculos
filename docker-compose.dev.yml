# ============================================================
# Docker Compose - Apenas infraestrutura para desenvolvimento local
# ============================================================
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# Sobe apenas PostgreSQL + Redis para desenvolvimento local.
# Backend e frontend rodam diretamente na maquina.
# ============================================================

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: analisador_curriculos
      POSTGRES_USER: analisador
      POSTGRES_PASSWORD: analisador
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analisador"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
